name: Release on Doc Update

on:
  push:
    branches: [main]
    paths:
      - 'SKILL.md'
      - 'REFERENCE.md'

permissions:
  contents: write

jobs:
  release:
    if: "!contains(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: version
        run: |
          V=$(cat VERSION)
          echo "current=${V}" >> $GITHUB_OUTPUT

      - name: Bump patch version
        id: bump
        run: |
          IFS='.' read -r MAJ MIN PAT <<< "${{ steps.version.outputs.current }}"
          NEW="${MAJ}.${MIN}.$((PAT + 1))"
          echo "new=${NEW}" >> $GITHUB_OUTPUT

      - name: Update version files
        run: |
          echo "${{ steps.bump.outputs.new }}" > VERSION
          sed -i "s/^version: .*/version: ${{ steps.bump.outputs.new }}/" SKILL.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION SKILL.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new }}"

      - name: Push and tag
        run: |
          git tag "v${{ steps.bump.outputs.new }}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.new }}"
          name: "v${{ steps.bump.outputs.new }}"
          body: |
            ## Changes

            Documentation update for fnpack v1.2.3.

            See [SKILL.md](SKILL.md) and [REFERENCE.md](REFERENCE.md) for details.
          generate_release_notes: false
